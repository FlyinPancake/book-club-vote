on:
  workflow_call:
    inputs:
      push:
        required: false
        type: boolean
        default: false
      ref:
        required: false
        type: string

env:
  IMAGE_NAME: ghcr.io/flyinpancake/book-club-vote

jobs:
  prepare:
    permissions:
      contents: read
      packages: write
    runs-on: ubuntu-latest
    outputs:
      tags: ${{ steps.meta.outputs.tags }}
      labels: ${{ steps.meta.outputs.labels }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}
      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ${{ env.IMAGE_NAME }}

  build:
    needs: prepare
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            platform_id: amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            platform_id: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - name: Build image (no push)
        if: ${{ !inputs.push }}
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: false
          tags: ${{ needs.prepare.outputs.tags }}
          labels: ${{ needs.prepare.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.platform_id }}
          cache-to: type=gha,mode=max,scope=${{ matrix.platform_id }}
      - name: Build and push by digest
        id: build_push
        if: ${{ inputs.push }}
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: ${{ matrix.platform }}
          labels: ${{ needs.prepare.outputs.labels }}
          outputs: type=image,name=${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ matrix.platform_id }}
          cache-to: type=gha,mode=max,scope=${{ matrix.platform_id }}
      - name: Export digest
        if: ${{ inputs.push }}
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build_push.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"
      - name: Upload digest
        if: ${{ inputs.push }}
        uses: actions/upload-artifact@v5
        with:
          name: digests-${{ matrix.platform_id }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  publish-manifest:
    if: ${{ inputs.push }}
    needs:
      - prepare
      - build
    permissions:
      contents: read
      packages: write
    runs-on: ubuntu-latest
    steps:
      - name: Download digests
        uses: actions/download-artifact@v5
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - name: Create and push multi-arch manifests
        env:
          TAGS: ${{ needs.prepare.outputs.tags }}
        run: |
          cd /tmp/digests
          sources=""
          for digest in *; do
            sources="$sources ${{ env.IMAGE_NAME }}@sha256:${digest}"
          done

          echo "$TAGS" | while IFS= read -r tag; do
            [ -n "$tag" ] || continue
            docker buildx imagetools create -t "$tag" $sources
          done
      - name: Inspect published image
        env:
          TAGS: ${{ needs.prepare.outputs.tags }}
        run: |
          first_tag="$(echo "$TAGS" | head -n 1)"
          docker buildx imagetools inspect "$first_tag"
